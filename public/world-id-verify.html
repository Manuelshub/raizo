<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Raizo — World ID Verification</title>
    <style>
      :root {
        --bg: #0a0a0f;
        --surface: #13131a;
        --border: #2a2a3a;
        --primary: #6366f1;
        --primary-light: #818cf8;
        --text: #e2e8f0;
        --text-muted: #94a3b8;
        --success: #22c55e;
        --danger: #ef4444;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
      }

      .container {
        max-width: 560px;
        width: 100%;
      }

      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        background: linear-gradient(135deg, var(--primary-light), #a78bfa);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0.5rem;
      }

      .subtitle {
        color: var(--text-muted);
        font-size: 0.9rem;
        margin-bottom: 2rem;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 1.5rem;
        margin-bottom: 1rem;
      }

      .card h2 {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 1rem;
      }

      label {
        display: block;
        font-size: 0.85rem;
        color: var(--text-muted);
        margin-bottom: 0.25rem;
      }

      input,
      textarea {
        width: 100%;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.6rem;
        color: var(--text);
        font-family: "JetBrains Mono", monospace;
        font-size: 0.85rem;
        margin-bottom: 0.75rem;
      }

      button {
        width: 100%;
        padding: 0.75rem;
        border: none;
        border-radius: 8px;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
      }

      .btn-primary {
        background: var(--primary);
        color: white;
      }
      .btn-primary:hover {
        background: var(--primary-light);
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-success {
        background: var(--success);
        color: white;
      }
      .btn-success:hover {
        opacity: 0.9;
      }

      .status {
        padding: 0.75rem;
        border-radius: 8px;
        font-size: 0.85rem;
        margin-top: 0.75rem;
      }
      .status.info {
        background: rgba(99, 102, 241, 0.1);
        border: 1px solid var(--primary);
      }
      .status.success {
        background: rgba(34, 197, 94, 0.1);
        border: 1px solid var(--success);
      }
      .status.error {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid var(--danger);
      }

      .qr-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 1.5rem;
      }

      .qr-container img {
        max-width: 200px;
        border-radius: 12px;
        margin-bottom: 1rem;
      }

      .proof-output {
        font-family: "JetBrains Mono", monospace;
        font-size: 0.75rem;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 200px;
        overflow-y: auto;
      }

      .step {
        display: none;
      }
      .step.active {
        display: block;
      }

      .step-indicator {
        display: flex;
        gap: 0.5rem;
        margin-bottom: 1.5rem;
      }

      .step-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--border);
        transition: background 0.3s;
      }
      .step-dot.active {
        background: var(--primary);
      }
      .step-dot.done {
        background: var(--success);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Raizo World ID Bridge</h1>
      <p class="subtitle">
        Sybil-resistant governance — verify your humanity via World ID.
      </p>

      <div class="step-indicator">
        <div class="step-dot active" id="dot-1"></div>
        <div class="step-dot" id="dot-2"></div>
        <div class="step-dot" id="dot-3"></div>
      </div>

      <!-- Step 1: Configure -->
      <div class="step active" id="step-1">
        <div class="card">
          <h2>Step 1 — Configure</h2>
          <label>RPC URL (Sepolia)</label>
          <input id="rpcUrl" value="https://rpc.sepolia.org" />
          <label>GovernanceGate Contract Address</label>
          <input id="contractAddr" value="0xf472ae388224674d0068776841eF466484b04E0C" />
          <label>Proposal Description</label>
          <input
            id="proposalDesc"
            value="Raizo Governance Proposal via World ID"
          />
          <button class="btn-primary" onclick="startVerification()">
            Generate World ID Proof Request
          </button>
          <div id="status-1"></div>
        </div>
      </div>

      <!-- Step 2: Scan QR -->
      <div class="step" id="step-2">
        <div class="card">
          <h2>Step 2 — Verify with World App</h2>
          <div class="qr-container">
            <p
              style="
                color: var(--text-muted);
                margin-bottom: 1rem;
                text-align: center;
              "
            >
              Scan the QR code with the <strong>World App</strong> or the
              <a
                href="https://simulator.worldcoin.org/"
                target="_blank"
                style="color: var(--primary-light)"
                >World ID Simulator</a
              >
              (staging mode).
            </p>
            <div id="qr-target"></div>
            <p
              id="connect-url"
              style="
                font-size: 0.75rem;
                color: var(--text-muted);
                word-break: break-all;
                margin-top: 1rem;
              "
            ></p>
          </div>
          <div id="status-2"></div>
        </div>
      </div>

      <!-- Step 3: Submit on-chain -->
      <div class="step" id="step-3">
        <div class="card">
          <h2>Step 3 — Submit Proof On-Chain</h2>
          <label>IDKit Response (JSON)</label>
          <textarea
            id="proofJson"
            rows="6"
            class="proof-output"
            readonly
          ></textarea>
          <button class="btn-success" onclick="submitOnChain()">
            Submit to GovernanceGate
          </button>
          <div id="status-3"></div>
        </div>
      </div>
    </div>

    <!-- IDKit Core (ESM via CDN) -->
    <script type="module">
      import { IDKit, orbLegacy } from "https://esm.sh/@worldcoin/idkit-core@4";

      // Make IDKit available globally
      window.IDKit = IDKit;
      window.orbLegacy = orbLegacy;
    </script>

    <!-- ethers.js for on-chain submission -->
    <script src="https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.umd.min.js"></script>

    <!-- QR Code generator -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1/build/qrcode.min.js"></script>

    <script>
      const APP_ID = "rp_aa1cd1f82b8d58fa";
      const RP_ID = "rp_aa1cd1f82b8d58fa";
      const ACTION = "raizo-governance-propose";

      let proofResult = null;

      function showStep(n) {
        document
          .querySelectorAll(".step")
          .forEach((s) => s.classList.remove("active"));
        document.getElementById(`step-${n}`).classList.add("active");
        for (let i = 1; i <= 3; i++) {
          const dot = document.getElementById(`dot-${i}`);
          dot.classList.remove("active", "done");
          if (i < n) dot.classList.add("done");
          if (i === n) dot.classList.add("active");
        }
      }

      function setStatus(step, msg, type = "info") {
        const el = document.getElementById(`status-${step}`);
        el.className = `status ${type}`;
        el.textContent = msg;
      }

      async function startVerification() {
        setStatus(1, "Generating IDKit verification request...", "info");

        try {
          // Fetch the signed rp_context from our local backend proxy (Same-Origin)
          setStatus(1, "Fetching signed rp_context from local backend...", "info");
          const signRes = await fetch("/sign");
          if (!signRes.ok) throw new Error("Backend failed to sign request");
          const rpSignature = await signRes.json();
          console.log(rpSignature);

          const request = await window.IDKit.request({
            app_id: APP_ID,
            action: ACTION,
            rp_context: {
              rp_id: RP_ID,
              nonce: rpSignature.nonce,
              created_at: rpSignature.createdAt,
              expires_at: rpSignature.expiresAt,
              signature: rpSignature.sig,
            },
            allow_legacy_proofs: true,
            environment: "staging", // Use simulator
          }).preset(window.orbLegacy({ signal: "" }));

          const connectUrl = request.connectorURI;
          console.log(connectUrl);

          // Show QR code
          showStep(2);
          const qrTarget = document.getElementById("qr-target");
          const canvas = document.createElement("canvas");
          await QRCode.toCanvas(canvas, connectUrl, {
            width: 200,
            color: { dark: "#818cf8", light: "#13131a" },
          });
          qrTarget.appendChild(canvas);

          document.getElementById("connect-url").textContent = connectUrl;
          setStatus(2, "Waiting for World App / Simulator scan...", "info");

          // Wait for proof
          const response = await request.pollUntilCompletion();
          proofResult = response;

          setStatus(2, "Proof received!", "success");
          showStep(3);

          document.getElementById("proofJson").value = JSON.stringify(
            response,
            null,
            2,
          );
          setStatus(
            3,
            "Proof ready. Click Submit to store on-chain for CRE verification.",
            "info",
          );
        } catch (err) {
          setStatus(1, `Error: ${err.message}`, "error");
        }
      }

      async function submitOnChain() {
        if (!proofResult) {
          setStatus(3, "No proof available.", "error");
          return;
        }

        setStatus(3, "Connecting wallet...", "info");

        try {
          if (!window.ethereum) {
            setStatus(3, "MetaMask or compatible wallet required.", "error");
            return;
          }

          const provider = new ethers.BrowserProvider(window.ethereum);
          const signer = await provider.getSigner();
          const network = await provider.getNetwork();

          if (network.chainId !== 11155111n) {
            setStatus(3, "Please switch to Sepolia testnet.", "error");
            return;
          }

          const contractAddr = document.getElementById("contractAddr").value;
          const proposalDesc = document.getElementById("proposalDesc").value;

          const descriptionHash = ethers.keccak256(
            ethers.toUtf8Bytes(proposalDesc),
          );
          const idkitResponseBytes = ethers.toUtf8Bytes(
            JSON.stringify(proofResult),
          );

          const abi = [
            "function submitProofRequest(bytes calldata idkitResponse, bytes32 descriptionHash) external returns (uint256 requestId)",
          ];
          const contract = new ethers.Contract(contractAddr, abi, signer);

          setStatus(3, "Submitting proof on-chain...", "info");
          const tx = await contract.submitProofRequest(
            idkitResponseBytes,
            descriptionHash,
          );
          setStatus(
            3,
            `TX sent: ${tx.hash}. Waiting for confirmation...`,
            "info",
          );

          const receipt = await tx.wait();
          setStatus(
            3,
            `Proof stored on-chain! TX: ${receipt.hash}. The CRE DON will verify it on the next cycle.`,
            "success",
          );
        } catch (err) {
          setStatus(3, `Error: ${err.message}`, "error");
        }
      }
    </script>
  </body>
</html>
